apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      derivedFields:
        - name: traceID
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        customQuery: true
        datasourceUid: loki
        query: '{app="$${__span.tags["service.name"]}"} |= `$${__span.traceId}`'
        tags:
          - key: ""
            value: ""

  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    jsonData:
      timeInterval: 30s
      maxDataPoints: 1000000
      disableUserFields: true
      disableStats: true
